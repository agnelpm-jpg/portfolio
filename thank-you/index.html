<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Agnel</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --void:#0a090c; --panel:#131218; --panel-2:#19171f; --ink:#ece9f0; --ink-dim:#8d899a; --ember:#ff8a3d; --line:rgba(236,233,240,0.12); --mono:'JetBrains Mono', monospace; --disp:'Space Grotesk', sans-serif; --body:'Inter', sans-serif; }
    *{box-sizing:border-box;} body{margin:0;font-family:var(--body);background:var(--void);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;}
    .card{max-width:760px;width:100%;background:linear-gradient(145deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:18px;padding:40px 32px;box-shadow:0 30px 80px -24px rgba(0,0,0,.7);} h1{font-family:var(--disp);font-size:clamp(28px,4vw,42px);margin:0 0 12px;line-height:1.1;} .sub{font-family:var(--mono);color:var(--ember);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:18px;} p{font-size:17px;line-height:1.75;color:var(--ink-dim);margin:0 0 14px;} a{display:inline-block;margin-top:20px;padding:10px 14px;border:1px solid var(--ember);border-radius:999px;color:var(--ember);text-decoration:none;font-family:var(--mono);font-size:12px;transition:all .2s;} a:hover{background:var(--ember);color:#0a090c;}
  </style>
</head>
<body>
  <main class="card">
    <div class="sub">message received</div>
    <h1>Message received.</h1>
    <p>Your note has been delivered. I’ll get back to you when the chaos permits.</p>
    <a href="/">← Return home</a>
  </main>
</body>
</html>
