function markdownToHTML(md){const mathBlocks=[];md=md.replace(/\$\$([\s\S]*?)\$\$/g,(m,g)=>{mathBlocks.push('$$'+g+'$$');return`@@MATH${mathBlocks.length-1}@@`;});md=md.replace(/\\\[([\s\S]*?)\\\]/g,(m,g)=>{mathBlocks.push('\\['+g+'\\]');return`@@MATH${mathBlocks.length-1}@@`;});md=md.replace(/\\\(([\s\S]*?)\\\)/g,(m,g)=>{mathBlocks.push('\\('+g+'\\)');return`@@MATH${mathBlocks.length-1}@@`;});md=md.replace(/\$([^\$\n][^\$]*)\$/g,(m,g)=>{mathBlocks.push('$'+g+'$');return`@@MATH${mathBlocks.length-1}@@`;});const lines=md.replace(/\r\n/g,'\n').split('\n');let html='',inList=false,inCode=false,code=[];const flushList=()=>{if(inList){html+='</ul>';inList=false}};const inline=s=>escapeHTML(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');lines.forEach(line=>{if(line.trim().startsWith('```')){if(inCode){html+=`<pre><code>${escapeHTML(code.join('\n'))}</code></pre>`;code=[];inCode=false;}else{flushList();inCode=true;}return}if(inCode){code.push(line);return}if(/^---\s*$/.test(line)){flushList();html+='<hr>';return}const h=line.match(/^(#{1,3})\s+(.*)$/);if(h){flushList();html+=`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`;return}const li=line.match(/^\s*[-*]\s+(.*)$/);if(li){if(!inList){html+='<ul>';inList=true}html+=`<li>${inline(li[1])}</li>`;return}if(line.trim()==''){flushList();return}flushList();html+=`<p>${inline(line)}</p>`});flushList();if(inCode)html+=`<pre><code>${escapeHTML(code.join('\n'))}</code></pre>`;html=html.replace(/@@MATH(\d+)@@/g,(_,n)=> mathBlocks[Number(n)]||'');return html}
