<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MSG — Mnemonic State Graph</title>
  <link rel="canonical" href="/papers/msg.html">
  <script>
  window.MathJax = {tex:{inlineMath:[['\\(','\\)'],['$','$']],displayMath:[['\\[','\\]'],['$$','$$']],processEscapes:true},options:{skipHtmlTags:['script','noscript','style','textarea','pre']},svg:{fontCache:'global'}};
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
  :root{--void:#0a090c;--panel:#131218;--panel-2:#19171f;--ink:#ece9f0;--ink-dim:#8d899a;--ember:#ff8a3d;--line-strong:rgba(236,233,240,0.18);--mono:'JetBrains Mono', monospace;--disp:'Space Grotesk', sans-serif;--body:'Inter', sans-serif}
  html,body{height:100%;}
  body{font-family:var(--body);background:var(--void);color:var(--ink);padding:32px;line-height:1.7}
  a{color:var(--ember)}
  .paper-content{color:var(--ink-dim);font-size:15px;line-height:1.76}
  .back-link{display:inline-block;padding:8px 12px;border:1px solid rgba(236,233,240,0.06);background:var(--panel);color:var(--ember);border-radius:8px;margin-bottom:12px;text-decoration:none}
  .vault-note,.collab-cta{border:1px solid var(--line-strong);background:var(--panel-2);padding:18px;border-radius:10px;margin:22px 0;color:var(--ink-dim);font-family:var(--mono);font-size:12.5px;line-height:1.7}
  .vault-note{border-color:rgba(255,138,61,.35);color:var(--ember);position:sticky;top:20px;z-index:90}
  .collab-cta strong{font-family:var(--disp);font-size:18px;color:var(--ink);display:block;margin-bottom:8px}
  .modal-links{display:flex;gap:10px;margin-top:10px}
  .modal-links a{font-family:var(--mono);font-size:12px;border:1px solid var(--line-strong);padding:8px 14px;border-radius:8px;color:var(--ember);text-decoration:none}
  .citation-box{margin-top:12px}
  .citation-box button{font-family:var(--mono);padding:8px 10px;border-radius:8px;border:1px solid var(--line-strong);background:transparent;color:var(--ember);cursor:pointer}
  .scroll-top{display:none;position:fixed;bottom:20px;right:20px;z-index:200;background:var(--panel);color:var(--ember);border:1px solid var(--line-strong);padding:8px 12px;border-radius:8px;cursor:pointer}
  </style>
</head>
<body>
  <a class="back-link" href="/">← back</a>
  <main id="content"><h1>Loading…</h1></main>
  <script>
  // Minimal markdown -> HTML used on index; preserves math tokens
  function escapeHTML(str){return String(str||'').replace(/[&<>"]+/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]||ch));}
  function markdownToHTML(md){
    const mathBlocks=[];
    md=md.replace(/\$\$([\s\S]*?)\$\$/g,(m,g)=>{mathBlocks.push('$$'+g+'$$');return`@@MATH${mathBlocks.length-1}@@`;});
    md=md.replace(/\\\[([\s\S]*?)\\\]/g,(m,g)=>{mathBlocks.push('\\['+g+'\\]');return`@@MATH${mathBlocks.length-1}@@`;});
    md=md.replace(/\\\(([\s\S]*?)\\\)/g,(m,g)=>{mathBlocks.push('\\('+g+'\\)');return`@@MATH${mathBlocks.length-1}@@`;});
    md=md.replace(/\$([^\$\n][^\$]*)\$/g,(m,g)=>{mathBlocks.push('$'+g+'$');return`@@MATH${mathBlocks.length-1}@@`;});
    const lines=md.replace(/\r\n/g,'\n').split('\n');let html='',inList=false,inCode=false,code=[];
    const flushList=()=>{if(inList){html+='</ul>';inList=false}};
    const inline=s=>escapeHTML(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
    lines.forEach(line=>{
      if(line.trim().startsWith('```')){if(inCode){html+=`<pre><code>${escapeHTML(code.join('\n'))}</code></pre>`;code=[];inCode=false;}else{flushList();inCode=true;}return}
      if(inCode){code.push(line);return}
      if(/^---\s*$/.test(line)){flushList();html+='<hr>';return}
      const h=line.match(/^(#{1,3})\s+(.*)$/);if(h){flushList();html+=`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`;return}
      const li=line.match(/^\s*[-*]\s+(.*)$/);if(li){if(!inList){html+='<ul>';inList=true}html+=`<li>${inline(li[1])}</li>`;return}
      if(line.trim()==''){flushList();return}
      flushList();html+=`<p>${inline(line)}</p>`;
    });flushList();if(inCode)html+=`<pre><code>${escapeHTML(code.join('\n'))}</code></pre>`;
    html = html.replace(/@@MATH(\d+)@@/g,(_,n)=> mathBlocks[Number(n)]||'');
    return html;
  }
  (async function(){
    try{
      const res=await fetch('msg-memory-architecture.md');
      if(!res.ok)throw new Error('not found');
      const md=await res.text();
      document.getElementById('content').innerHTML=`<h1>MSG — Mnemonic State Graph</h1>
        <div class="vault-note">psst, I'm still working on these, so u guys are the first to get a sneak peek. Limited access babyyy.</div>
        <div class="paper-content">${markdownToHTML(md)}</div>
        <div class="collab-cta"><strong>If you actually understand this math, let's build something.</strong>But let's be real -- you're probably just going to close this tab.</div>
        <div class="modal-links"><a class="zenodo-link" href="https://zenodo.org/records/21252408" target="_blank" rel="noopener">Full paper (Zenodo) -></a></div>
        <div class="citation-box"><button id="copyBib">📋 Copy BibTeX Citation</button></div>`;
      // Copy citation
      document.addEventListener('click',e=>{if(e.target && e.target.id==='copyBib'){
        const bibtex = `@misc{suresh2026msg,\n  author = {Suresh, Agnel},\n  title = {Mnemonic State Graph: AI Memory Architecture},\n  year = {2026},\n  url = {https://agnel.machfold.in/papers/msg.html}\n}`;
        navigator.clipboard.writeText(bibtex).then(()=>alert('Citation copied to clipboard!'))
      }});
      // scroll-to-top
      document.body.insertAdjacentHTML('beforeend','<button id="scrollTopBtn" class="scroll-top" aria-label="Scroll to top">↑ Top</button>');
      const _btn=document.getElementById('scrollTopBtn');
      window.addEventListener('scroll',()=>{if(document.documentElement.scrollTop>400||document.body.scrollTop>400)_btn.style.display='block';else _btn.style.display='none'});
      _btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
      if(window.MathJax && typeof window.MathJax.typesetPromise==='function')window.MathJax.typesetPromise();
    }catch(e){document.getElementById('content').innerHTML='<h1>Content unavailable</h1><p>Could not load the markdown file.</p>'}
  })();
  </script>
</body>
</html>
